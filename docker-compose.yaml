version: "3.9"
services:
  bot_folder_scan:
    build: .
    container_name: bot_folder_scan
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ".:/app/"
      - "${KEY_FOLDER}:/app/keys"

    expose:
      - ""
    env_file:
      - ".env."
    working_dir: /app
    command:
      - sh
      - -c
      - |
        python3 manage.py makemigrations
        
   