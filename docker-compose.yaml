version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: bot_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bot_password}
      POSTGRES_DB: ${POSTGRES_DB:-bot_database}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-bot_user} -d $${POSTGRES_DB:-bot_database}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: bot_app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bot_user}:${POSTGRES_PASSWORD:-bot_password}@db:5432/${POSTGRES_DB:-bot_database}
    volumes:
      - .:/app
      - ${TARGET_FOLDER:-./tmp}:/app/scan_target
    command: >
      sh -c "alembic upgrade head && python main.py"
    restart: unless-stopped

volumes:
  postgres_data:
        
   